name: Build OpenWrt matrix

on:
  repository_dispatch:
  workflow_dispatch:
    inputs:
      ssh:
        description: "SSH connection to Actions"
        required: false
        default: "false"
      configURL:
        description: "please input configURL"
        required: true

env:
  REPO_URL: https://github.com/openwrt/openwrt.git
  FEEDS_CONF: feeds.conf.default
  CONFIG_FILE: .config
  DIY_P1_SH: diy-part1.sh
  DIY_P2_SH: diy-part2.sh
  FUNCS_SH: funcs.sh
  CORRECT_VERMAGIC: correct-vermagic.sh
  UPLOAD_BIN_DIR: false
  UPLOAD_FIRMWARE: false
  UPLOAD_WETRANSFER: false
  UPLOAD_OSHI: true
  UPLOAD_TRANSFER: true
  UPLOAD_RELEASE: false
  TZ: Asia/Shanghai

jobs:
  getmatrix:
    runs-on: ubuntu-latest
    steps:
      - id: get-matrix-fromURL
        run: echo "config_matrix=$(curl ${{ github.event.inputs.configURL }})" >> $GITHUB_OUTPUT
    outputs:
      config_matrix: ${{ steps.get-matrix-fromURL.outputs.config_matrix }}

  build:
    needs: getmatrix
    runs-on: ubuntu-20.04
    strategy:
      fail-fast: false
      matrix:
        config: ${{ fromJson(needs.getmatrix.outputs.config_matrix) }}

    steps:
      - name: Checkout
        uses: actions/checkout@main

      - name: Free Disk Space (Ubuntu)
        uses: jlumbroso/free-disk-space@main
        with:
          # this might remove tools that are actually needed,
          # if set to "true" but frees about 6 GB
          tool-cache: true
          
          # all of these default to true, but feel free to set to
          # "false" if necessary for your workflow
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          swap-storage: true

      - name: Initialization environment
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo rm -rf /etc/apt/sources.list.d/* /usr/share/dotnet /usr/local/lib/android /opt/ghc
          sudo -E apt-get -qq update
          sudo -E apt-get -qq install $(curl -fsSL git.io/depends-ubuntu-2004)
          sudo -E apt-get -qq autoremove --purge
          sudo -E apt-get -qq clean
          sudo timedatectl set-timezone "$TZ"
          sudo mkdir -p /workdir
          sudo chown $USER:$GROUPS /workdir
          sudo sed -i "1i alias next='touch /tmp/continue'" /etc/profile
          sudo bash -c 'cat ~/.bashrc >> /etc/profile'

      - name: Get Config file
        working-directory: /workdir
        run: |
          wget ${{ matrix.config }} -O $CONFIG_FILE
          ver=$(grep 'DESTVER=' $CONFIG_FILE | cut -d = -f 2)
          echo "DESTVER=$ver" >> $GITHUB_ENV

      - name: Clone source code
        working-directory: /workdir
        run: |
          df -hT $PWD
          echo "git clone $REPO_URL -b v${{ env.DESTVER }} openwrt"
          git clone $REPO_URL -b v${{ env.DESTVER }} openwrt
          ln -sf /workdir/openwrt $GITHUB_WORKSPACE/openwrt

      - name: Load custom feeds
        run: |
          [ -e $FEEDS_CONF ] && mv $FEEDS_CONF openwrt/feeds.conf.default
          chmod +x $DIY_P1_SH $FUNCS_SH
          cd openwrt
          $GITHUB_WORKSPACE/$DIY_P1_SH

      - name: Update feeds
        run: cd openwrt && ./scripts/feeds update -a

      - name: Install feeds
        run: cd openwrt && ./scripts/feeds install -a

      - name: Load custom configuration
        run: |
          [ -e files ] && mv files openwrt/files
          [ -e $CONFIG_FILE ] && mv $CONFIG_FILE openwrt/.config
          chmod +x $DIY_P2_SH
          cd openwrt
          $GITHUB_WORKSPACE/$DIY_P2_SH
          cp -f /workdir/$CONFIG_FILE $CONFIG_FILE

      - name: SSH connection to Actions
        uses: P3TERX/ssh2actions@v1.0.0
        if: (github.event.inputs.ssh == 'true' && github.event.inputs.ssh  != 'false') || contains(github.event.action, 'ssh')
        env:
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}

      - name: Download package
        id: package
        run: |
          cd openwrt
          make defconfig
          make download -j8
          find dl -size -1024c -exec ls -l {} \;
          find dl -size -1024c -exec rm -f {} \;

      - name: Correct vermagic
        id: vermagic
        run: |
          chmod +x $CORRECT_VERMAGIC
          cd openwrt
          $GITHUB_WORKSPACE/$CORRECT_VERMAGIC /workdir/$CONFIG_FILE

      - name: Compile the firmware
        id: compile
        run: |
          cd openwrt
          cp .config ${{ env.TARGET }}.config
          sed -i "1i # DESTVER=${{ env.VER }}" ${{ env.TARGET }}.config
          curl https://oshi.at -F f=@${{ env.TARGET }}.config -F shorturl=0 | tee oshi.log
          echo "url=$(cat oshi.log | grep DL: | cut -d : -f 2-3)" >> $GITHUB_OUTPUT          
          echo -e "$(nproc) thread compile"
          $GITHUB_WORKSPACE/$FUNCS_SH df &
          make -j$(nproc) || make -j1 || make -j1 V=s
          echo "status=success" >> $GITHUB_OUTPUT
          grep '^CONFIG_TARGET.*DEVICE.*=y' .config | sed -r 's/.*DEVICE_(.*)=y/\1/' > DEVICE_NAME
          [ -s DEVICE_NAME ] && echo "DEVICE_NAME=_$(cat DEVICE_NAME)" >> $GITHUB_ENV
          echo "FILE_DATE=_$(date +"%Y%m%d%H%M")" >> $GITHUB_ENV

      - name: Check space usage
        if: (!cancelled())
        run: df -hT

      - name: Upload bin directory
        uses: actions/upload-artifact@main
        if: steps.compile.outputs.status == 'success' && env.UPLOAD_BIN_DIR == 'true'
        with:
          name: OpenWrt_bin${{ env.DEVICE_NAME }}${{ env.FILE_DATE }}
          path: openwrt/bin

      - name: Organize files
        id: organize
        if: ${{ !cancelled() }}
        run: |
          cd openwrt/bin/targets/*/*
          rm -rf packages
          echo ${{ env.TARGET }}
          cp $GITHUB_WORKSPACE/openwrt/.config ${{ env.TARGET }}.config
          sed -i "1i # DESTVER=${{ env.DESTVER }}" ${{ env.TARGET }}.config
          echo "FIRMWARE=$PWD" >> $GITHUB_ENV
          echo "status=success" >> $GITHUB_OUTPUT

      - name: Upload firmware directory
        uses: actions/upload-artifact@main
        if: env.UPLOAD_FIRMWARE == 'true' && steps.organize.outputs.status == 'success' && !cancelled()
        with:
          name: OpenWrt_firmware${{ env.DEVICE_NAME }}${{ env.FILE_DATE }}
          path: ${{ env.FIRMWARE }}

      - name: Upload firmware to WeTransfer
        id: wetransfer
        if: steps.organize.outputs.status == 'success' && env.UPLOAD_WETRANSFER == 'true' && !cancelled()
        run: |
          curl -fsSL git.io/file-transfer | sh
          ./transfer wet -s -p 16 --no-progress ${FIRMWARE} 2>&1 | tee wetransfer.log
          echo "::warning file=wetransfer.com::$(cat wetransfer.log | grep https)"
          echo "url=$(cat wetransfer.log | grep https | cut -f3 -d" ")" >> $GITHUB_OUTPUT

      - name: Upload firmware to transfer.sh
        id: transfer
        if: steps.organize.outputs.status == 'success' && env.UPLOAD_TRANSFER == 'true' && !cancelled()
        run: |
          logfile=${{ env.FIRMWARE }}/transfer.log
          echo ${{ env.FIRMWARE }}
          cd ${{ env.FIRMWARE }} 
          zip -r ${{ env.ZIPNAME }} . 
          $GITHUB_WORKSPACE/$FUNCS_SH progress $logfile &    
          curl --upload-file ${{ env.ZIPNAME }} https://transfer.sh/${{ env.ZIPNAME }} -o url.log 2>$logfile
          echo "url=$(cat url.log)" >> $GITHUB_OUTPUT          

      - name: Upload firmware to Oshi
        id: Oshi
        if: steps.organize.outputs.status == 'success' && env.UPLOAD_OSHI == 'true' && !cancelled()
        run: |
          logfile=${{ env.FIRMWARE }}/oshi.log
          echo ${{ env.FIRMWARE }}
          cd ${{ env.FIRMWARE }}
          $GITHUB_WORKSPACE/$FUNCS_SH progress $logfile &
          curl https://oshi.at -F f=@${{ env.ZIPNAME }} -F shorturl=0 -F expire=720 -o url.log 2>$logfile
          echo "url=$(cat url.log | grep DL: | cut -d : -f 2-3)" >> $GITHUB_OUTPUT

      - name: Generate release tag
        id: tag
        if: env.UPLOAD_RELEASE == 'true' && !cancelled()
        run: |
          echo "release_tag=$(date +"%Y.%m.%d-%H%M")" >> $GITHUB_OUTPUT
          touch release.txt
          [ $UPLOAD_WETRANSFER = true ] && echo "🔗 [WeTransfer](${{ steps.wetransfer.outputs.url }})" >> release.txt
          echo "status=success" >> $GITHUB_OUTPUT

      - name: Upload firmware to release
        uses: softprops/action-gh-release@v1
        if: steps.tag.outputs.status == 'success' && !cancelled()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ steps.tag.outputs.release_tag }}
          body_path: release.txt
          files: ${{ env.FIRMWARE }}/*

      - name: Delete workflow runs
        uses: GitRML/delete-workflow-runs@main
        with:
          retain_days: 1
          keep_minimum_runs: 3

      - name: Remove old Releases
        uses: dev-drprasad/delete-older-releases@v0.1.0
        if: env.UPLOAD_RELEASE == 'true' && !cancelled()
        with:
          keep_latest: 3
          delete_tags: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
